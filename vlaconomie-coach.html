<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vlaconomie AI Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:    #0f1117;
            --bg2:   #181c26;
            --bg3:   #1e2330;
            --goud:  #f0c040;
            --groen: #4caf7d;
            --gd:    #e8a020;
            --text:  #e8e8e8;
            --muted: #8a90a0;
            --border:#2a3040;
            --user-bg: #1a3a2a;
            --ai-bg:   #1e2330;
            --radius: 18px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .chat-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            height: min(88vh, 780px);
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(240,192,64,0.08);
        }

        /* Header */
        .header {
            padding: 18px 22px 16px;
            background: var(--bg3);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--goud), var(--gd));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .header-text h1 {
            font-family: 'Lexend', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--goud);
            letter-spacing: 0.02em;
        }

        .header-text p {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: var(--groen);
            border-radius: 50%;
            margin-left: auto;
            box-shadow: 0 0 6px var(--groen);
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Chat area */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .msg-row {
            display: flex;
            gap: 10px;
            animation: fadeUp 0.25s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user { flex-direction: row-reverse; }

        .msg-icon {
            width: 30px; height: 30px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-row.ai   .msg-icon { background: var(--bg3); }
        .msg-row.user .msg-icon { background: var(--user-bg); }

        .bubble {
            padding: 11px 15px;
            border-radius: 16px;
            max-width: 82%;
            line-height: 1.55;
            font-size: 14px;
        }

        .msg-row.ai   .bubble {
            background: var(--ai-bg);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
            color: var(--text);
        }

        .msg-row.user .bubble {
            background: var(--user-bg);
            border: 1px solid rgba(76,175,125,0.25);
            border-top-right-radius: 4px;
            color: #c8f0d8;
        }

        /* Markdown-achtige opmaak in AI berichten */
        .bubble strong { color: var(--goud); font-weight: 600; }
        .bubble em { color: var(--groen); font-style: italic; }
        .bubble code {
            background: rgba(240,192,64,0.12);
            padding: 1px 5px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: var(--goud);
        }
        .bubble ul, .bubble ol {
            padding-left: 18px;
            margin: 6px 0;
        }
        .bubble li { margin: 3px 0; }
        .bubble p + p { margin-top: 6px; }

        /* Typing indicator */
        .typing .bubble {
            padding: 14px 18px;
        }
        .dots { display: flex; gap: 5px; align-items: center; }
        .dots span {
            width: 7px; height: 7px;
            background: var(--muted);
            border-radius: 50%;
            animation: bounce 1.2s ease infinite;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        /* Suggesties */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 18px 14px;
        }

        .suggestion-btn {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 7px 13px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }

        .suggestion-btn:hover {
            border-color: var(--goud);
            color: var(--goud);
            background: rgba(240,192,64,0.06);
        }

        /* Input area */
        .input-area {
            padding: 14px 16px;
            background: var(--bg3);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            resize: none;
            outline: none;
            max-height: 120px;
            min-height: 44px;
            line-height: 1.5;
            transition: border-color 0.2s;
        }

        textarea:focus { border-color: rgba(240,192,64,0.4); }
        textarea::placeholder { color: var(--muted); }

        .send-btn {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--goud), var(--gd));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .send-btn:hover { transform: scale(1.06); box-shadow: 0 4px 16px rgba(240,192,64,0.3); }
        .send-btn:active { transform: scale(0.97); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .send-btn svg { width: 18px; height: 18px; fill: #000; }

        /* Reset knop */
        .reset-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 11px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            transition: color 0.2s;
            position: absolute;
            top: 18px;
            right: 16px;
        }
        .reset-btn:hover { color: var(--goud); }

        /* Footer label */
        .footer-label {
            text-align: center;
            font-size: 11px;
            color: var(--muted);
            padding: 6px 0 8px;
            opacity: 0.6;
        }

        .footer-label a { color: var(--goud); text-decoration: none; }
    </style>
</head>
<body>

<div class="chat-wrap">

    <div class="header">
        <div class="avatar">📊</div>
        <div class="header-text">
            <h1>Vlaconomie Coach</h1>
            <p>Hulp bij Economie · Pincode & Cumulus</p>
        </div>
        <div class="status-dot"></div>
        <button class="reset-btn" onclick="resetChat()" title="Gesprek wissen">↺ Reset</button>
    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="suggestions" id="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion('Wat is schaarste?')">Wat is schaarste?</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Leg vraag en aanbod uit')">Vraag & aanbod</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Hoe bereken ik de omloopsnelheid?')">Omloopsnelheid</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Wat is het verschil tussen kosten en uitgaven?')">Kosten vs uitgaven</button>
    </div>

    <div class="input-area">
        <textarea
            id="userInput"
            placeholder="Stel je vraag over economie..."
            rows="1"
            oninput="autoResize(this)"
            onkeydown="handleKey(event)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
    <div class="footer-label">vlaconomie.nl — AI Coach (beta)</div>
</div>

<script>
// ── Gespreksgeschiedenis ────────────────────────────────────────────────────
let history = [];

const SYSTEM_PROMPT = `Je bent een vriendelijke en geduldige economiedocent voor vlaconomie.nl.
Je helpt VMBO, HAVO en VWO leerlingen (klas 1 t/m 6) bij economie, gebaseerd op de methodes Pincode en Cumulus.

Gedragsregels:
- Geef NOOIT direct het antwoord op een rekensom — help stap voor stap
- Gebruik herkenbare voorbeelden (sneakers, bijbaantje, TikTok, Spotify, supermarkt)
- Schrijf kort en helder; geen lange lappen tekst
- Gebruik **vetgedrukt** voor begrippen en *schuingedrukt* voor nadruk
- Stel na je uitleg een korte controlevraag om te checken of het duidelijk is
- Spreek de leerling aan met "jij/je"
- Als een vraag niet over economie gaat, wijs dan vriendelijk terug naar economie`;

// ── UI helpers ──────────────────────────────────────────────────────────────
function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function scrollDown() {
    const box = document.getElementById('chatBox');
    box.scrollTop = box.scrollHeight;
}

function hideSuggestions() {
    const s = document.getElementById('suggestions');
    if (s) s.style.display = 'none';
}

// Eenvoudige markdown → HTML (bold, italic, code, lijsten)
function renderMarkdown(text) {
    return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/^[-•] (.+)/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
        .replace(/\n{2,}/g, '</p><p>')
        .replace(/\n/g, '<br>')
        .replace(/^(.+)$/, '<p>$1</p>');
}

function addMessage(role, text) {
    const box = document.getElementById('chatBox');
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const icon = document.createElement('div');
    icon.className = 'msg-icon';
    icon.textContent = role === 'ai' ? '📊' : '🎒';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'ai') {
        bubble.innerHTML = renderMarkdown(text);
    } else {
        bubble.textContent = text;
    }

    row.appendChild(icon);
    row.appendChild(bubble);
    box.appendChild(row);
    scrollDown();
    return row;
}

function showTyping() {
    const box = document.getElementById('chatBox');
    const row = document.createElement('div');
    row.className = 'msg-row ai typing';
    row.id = 'typingIndicator';
    row.innerHTML = `
        <div class="msg-icon">📊</div>
        <div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
    box.appendChild(row);
    scrollDown();
}

function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
}

// ── Berichten versturen ─────────────────────────────────────────────────────
async function sendMessage(overrideText) {
    const input = document.getElementById('userInput');
    const userText = (overrideText || input.value).trim();
    if (!userText) return;

    hideSuggestions();
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    addMessage('user', userText);

    // Voeg toe aan geschiedenis
    history.push({ role: 'user', content: userText });

    showTyping();

    try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 1000,
                system: SYSTEM_PROMPT,
                messages: history
            })
        });

        const data = await response.json();
        removeTyping();

        if (data.content && data.content[0]) {
            const aiText = data.content[0].text;
            history.push({ role: 'assistant', content: aiText });
            addMessage('ai', aiText);
        } else {
            addMessage('ai', 'Sorry, er ging iets mis. Probeer het nog eens!');
        }

    } catch (err) {
        removeTyping();
        addMessage('ai', 'Oeps — geen verbinding. Controleer je internetverbinding en probeer het opnieuw.');
    }

    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
}

function sendSuggestion(text) {
    sendMessage(text);
}

function resetChat() {
    history = [];
    document.getElementById('chatBox').innerHTML = '';
    document.getElementById('suggestions').style.display = 'flex';
    addMessage('ai', 'Gesprek gewist! Waar kan ik je mee helpen?');
}

// ── Welkomstbericht ─────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
    addMessage('ai', 'Hoi! Ik ben de **Vlaconomie Coach**. Ik help je met economie voor Pincode en Cumulus.\n\nStel gerust je vraag — of kies een onderwerp hieronder. 👇');
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vlaconomie — Adaptieve Rekentrainer 2F</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --groen:#0f4d2e;--gd:#1a7a4a;--gl:#2ecc71;--glicht:#e8faf0;--gzl:#f0fdf4;
  --goud:#f0c040;--goudd:#d4a012;
  --rood:#b30000;--roodl:#e53e3e;
  --rand:#e0e8f4;--bg:#f4f7f4;
  --sh:0 2px 10px rgba(0,0,0,.08)
}
body{font-family:'DM Sans',Arial,sans-serif;background:var(--bg);color:#1a1a2e;font-size:15px;min-height:100vh}

/* ── Header ── */
header{background:linear-gradient(135deg,var(--groen),var(--gd));position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,77,46,.4)}
.hdr-top{padding:10px 20px;display:flex;align-items:center;gap:12px}
.logo{font-family:'Lexend',sans-serif;font-size:1.3rem;font-weight:800;color:#fff;text-decoration:none;letter-spacing:-.5px}
.logo em{color:var(--goud);font-style:normal}
.logo-sub{font-size:.68rem;color:rgba(255,255,255,.65);font-family:'DM Sans',sans-serif;margin-top:1px}
.hdr-terug{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;font-family:'Lexend',sans-serif;font-size:.78rem;font-weight:600;padding:7px 14px;border-radius:20px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:background .2s}
.hdr-terug:hover{background:rgba(255,255,255,.25)}

/* ── Main ── */
main{max-width:860px;margin:0 auto;padding:20px 14px 60px}

/* ── Rekentrainer componenten ── */
.rt-header{background:linear-gradient(135deg,var(--groen),var(--gd));color:#fff;padding:22px 26px;border-radius:12px 12px 0 0}
.rt-header .pn{font-family:'Lexend',sans-serif;font-size:.7rem;background:var(--goud);color:var(--groen);padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:8px;font-weight:700}
.rt-header h1{font-family:'Lexend',sans-serif;font-size:1.4rem;margin-bottom:4px;font-weight:800}
.rt-header p{color:rgba(255,255,255,.8);font-size:.87rem}

.rt-meter-wrap{background:#fff;padding:14px 22px;border:1px solid var(--rand);border-top:none;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.rt-meter-label{font-family:'Lexend',sans-serif;font-size:.75rem;font-weight:700;color:var(--gd);white-space:nowrap}
.rt-meter-bar-bg{flex:1;height:10px;background:#e0e8f0;border-radius:10px;min-width:80px}
.rt-meter-bar{height:10px;border-radius:10px;background:linear-gradient(90deg,var(--gd),var(--gl));transition:width .5s ease;width:0%}
.rt-meter-val{font-family:'Lexend',sans-serif;font-size:.8rem;font-weight:700;color:var(--groen);min-width:68px;text-align:right}
.rt-streak{font-size:.75rem;color:var(--goudd);font-weight:700;font-family:'Lexend',sans-serif}
.rt-btn-reset{background:none;border:2px solid #ccc;color:#888;font-size:.73rem;padding:5px 12px;margin-left:auto;font-family:'Lexend',sans-serif;border-radius:8px;cursor:pointer;transition:all .2s}
.rt-btn-reset:hover{border-color:var(--roodl);color:var(--roodl)}

.rt-body{background:#fff;padding:20px 22px 26px;border:1px solid var(--rand);border-top:none;border-radius:0 0 12px 12px;margin-bottom:18px}

.rt-stats-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.rt-stat-pill{background:#f4f7f4;border:1px solid var(--rand);border-radius:20px;padding:4px 13px;font-size:.77rem;font-family:'Lexend',sans-serif;display:flex;align-items:center;gap:5px}
.rt-stat-pill span{font-weight:700;color:var(--gd)}

.rt-badge-row{margin-bottom:10px}
.rt-cat-badge{display:inline-block;font-family:'Lexend',sans-serif;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:3px 10px;border-radius:12px;background:var(--glicht);color:var(--gd)}
.rt-lvl-badge{display:inline-block;font-family:'Lexend',sans-serif;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:3px 10px;border-radius:12px;margin-left:6px}
.rt-lvl-badge.easy{background:#d1fae5;color:#065f46}
.rt-lvl-badge.med{background:#fef3c7;color:#92400e}
.rt-lvl-badge.hard{background:#fee2e2;color:#991b1b}

.rt-context{background:var(--gzl);border-left:4px solid var(--gd);border-radius:0 8px 8px 0;padding:10px 14px;font-size:.86rem;color:#333;line-height:1.55;margin-bottom:13px}
.rt-vraag{font-weight:600;font-size:.93rem;line-height:1.6;color:#1a1a2e;margin-bottom:14px}

.opts{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.opt{padding:10px 14px;border:2px solid #ddd;border-radius:7px;cursor:pointer;font-size:.87rem;background:#fff;text-align:left;transition:all .2s;font-family:'DM Sans',sans-serif;width:100%}
.opt:hover:not([disabled]){border-color:var(--gd);background:var(--glicht)}
.opt.ok{border-color:var(--gd)!important;background:var(--glicht);color:var(--groen);font-weight:600}
.opt.fout{border-color:var(--roodl)!important;background:#fdecea;color:#c0392b}
.opt[disabled]{cursor:default}

.rt-inp{width:100%;padding:10px 13px;border:2px solid var(--rand);border-radius:8px;font-size:.92rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;margin-bottom:6px}
.rt-inp:focus{border-color:var(--gd)}
.rt-inp.ok{border-color:var(--gd);background:var(--glicht)}
.rt-inp.fout{border-color:var(--roodl);background:#fdecea}
.rt-hint{font-size:.78rem;color:var(--goudd);margin-bottom:8px;font-style:italic}

.qfb{margin-top:8px;font-size:.87rem;display:none;padding:12px 14px;border-radius:8px;line-height:1.6}
.qfb.ok{display:block;color:var(--groen);background:var(--glicht);border-left:4px solid var(--gd)}
.qfb.fout{display:block;color:#c0392b;background:#fdecea;border-left:4px solid var(--roodl)}
.qfb-coach{font-style:italic;margin-top:7px;color:#555;font-size:.84rem}

.rt-btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;align-items:center}
.rt-btn{font-family:'Lexend',sans-serif;font-size:.82rem;font-weight:700;padding:9px 20px;border-radius:8px;cursor:pointer;transition:all .2s;border:none}
.rt-btn-primary{background:var(--gd);color:#fff}
.rt-btn-primary:hover{background:var(--groen)}
.rt-btn-next{background:var(--goud);color:var(--groen);display:none}
.rt-btn-next:hover{background:var(--goudd);color:#fff}

@media(max-width:600px){
  .rt-header h1{font-size:1.15rem}
  .hdr-top{padding:8px 14px}
}
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <a href="index.html" style="text-decoration:none">
      <div class="logo">vla<em>conomie</em>.nl</div>
      <div class="logo-sub">Economie · 2F Rekentrainer</div>
    </a>
    <a href="index.html" class="hdr-terug">← Terug naar home</a>
  </div>
</header>

<main>
  <div class="rt-header">
    <div class="pn">🧮 Rekentrainer 2F</div>
    <h1>Adaptieve Rekentrainer</h1>
    <p>Getallen · Verhoudingen · Procenten · Meten — elke keer andere getallen, oneindig veel oefening</p>
  </div>

  <div class="rt-meter-wrap">
    <div class="rt-meter-label">Jouw niveau</div>
    <div class="rt-meter-bar-bg"><div class="rt-meter-bar" id="rt-bar"></div></div>
    <div class="rt-meter-val" id="rt-mval">Starter</div>
    <div class="rt-streak" id="rt-streak">🔥 0 op rij</div>
    <button class="rt-btn-reset" onclick="vlacoRekenReset()">↺ Reset</button>
  </div>

  <div class="rt-body">
    <div class="rt-stats-row">
      <div class="rt-stat-pill">✅ Goed: <span id="rt-goed">0</span></div>
      <div class="rt-stat-pill">❌ Fout: <span id="rt-fout">0</span></div>
      <div class="rt-stat-pill">📋 Vragen: <span id="rt-tot">0</span></div>
      <div class="rt-stat-pill">📊 Score: <span id="rt-pct">—</span></div>
    </div>
    <div id="rt-kaart"></div>
  </div>
</main>

<script>
(function(){
'use strict';

/* ─── HULPFUNCTIES ─────────────────────────────────────────────────────── */
function ri(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function kies(arr){return arr[Math.floor(Math.random()*arr.length)];}
function af(n,d){return parseFloat(n.toFixed(d===undefined?2:d));}
function fmt(n,d){
  d=d===undefined?0:d;
  return af(n,d).toLocaleString('nl-NL',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function shu(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=ri(0,i);var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function mc(goed,wrong){
  var foute=shu(wrong.filter(function(x){return String(x)!==String(goed);})).slice(0,3);
  var alle=shu([goed].concat(foute));
  return{opties:alle,correct:alle.indexOf(goed)};
}
var NAMEN=['Daan','Layla','Mo','Sara','Tim','Fenna','Jayden','Noor','Liam','Zara'];
var COACHES=['Daan','Layla'];
function naam(){return kies(NAMEN);}
function coach(){return kies(COACHES);}

/* ─── SJABLONEN ────────────────────────────────────────────────────────────
   50 sjablonen, elk genereert willekeurige getallen → oneindig veel variaties
   ─────────────────────────────────────────────────────────────────────────── */
var S=[

  /* ══ NIVEAU 1 — GETALLEN ══ */
  function(){var n=naam(),u=ri(8,16)+kies([0,.25,.5,.75]),h=ri(2,9),tot=af(u*h,2);
    var r=mc('€'+fmt(tot,2),['€'+fmt(af(tot+u,2),2),'€'+fmt(af(tot-u,2),2),'€'+fmt(af(tot+2*u,2),2)]);
    return{niveau:1,categorie:'Getallen',context:n+' heeft een bijbaan en verdient €'+fmt(u,2)+' per uur.',
      vraag:n+' werkt '+h+' uur. Hoeveel verdient '+n+' in totaal?',
      type:'mc',opties:r.opties,correct:r.correct,eenheid:'€',
      uitleg:'€'+fmt(u,2)+' × '+h+' = <strong>€'+fmt(tot,2)+'</strong>.',
      coachTekst:coach()+': "Vermenigvuldig uurloon × uren. '+fmt(u,2)+' × '+h+' = '+fmt(tot,2)+'."'};},

  function(){var n=naam(),betaal=kies([5,10,20,50]);
    var p1=af(ri(0,3)+ri(0,9)*0.1,2),p2=af(ri(0,4)+ri(0,9)*0.1,2),p3=af(ri(0,2)+ri(0,9)*0.1,2);
    var som=af(p1+p2+p3,2),wissel=af(betaal-som,2);
    if(wissel<0.5||wissel>=betaal)return null;
    var r=mc('€'+fmt(wissel,2),['€'+fmt(af(wissel+0.5,2),2),'€'+fmt(af(wissel-0.3,2),2),'€'+fmt(af(wissel+1.2,2),2)]);
    return{niveau:1,categorie:'Getallen',context:n+' gaat naar de supermarkt met €'+betaal+',– op zak.',
      vraag:n+' koopt drie producten: €'+fmt(p1,2)+', €'+fmt(p2,2)+' en €'+fmt(p3,2)+'. Hoeveel wisselgeld krijgt '+n+' terug?',
      type:'mc',opties:r.opties,correct:r.correct,eenheid:'€',
      uitleg:'Totaal: '+fmt(p1,2)+'+'+fmt(p2,2)+'+'+fmt(p3,2)+'=€'+fmt(som,2)+'. Wissel: '+betaal+'−'+fmt(som,2)+' = <strong>€'+fmt(wissel,2)+'</strong>.',
      coachTekst:coach()+': "Tel de drie bedragen op en trek af van het betaalde."'};},

  function(){var n=naam(),prijs=ri(1,15)+kies([0,.5]),aantal=ri(3,20),tot=af(prijs*aantal,2);
    var prod=kies(['appels','peren','sinaasappels','bananen','tomaten']);
    var r=mc('€'+fmt(tot,2),['€'+fmt(af(tot+prijs,2),2),'€'+fmt(af(tot-prijs,2),2),'€'+fmt(af(prijs*aantal+aantal,2),2)]);
    return{niveau:1,categorie:'Getallen',context:n+' koopt '+prod+' op de markt. De prijs is €'+fmt(prijs,2)+' per kilo.',
      vraag:n+' koopt '+aantal+' kilo. Hoeveel betaalt '+n+' in totaal?',
      type:'mc',opties:r.opties,correct:r.correct,eenheid:'€',
      uitleg:'€'+fmt(prijs,2)+' × '+aantal+' = <strong>€'+fmt(tot,2)+'</strong>.',
      coachTekst:coach()+': "Prijs per kilo × aantal kilo. '+fmt(prijs,2)+' × '+aantal+' = '+fmt(tot,2)+'."'};},

  function(){var n=naam(),pak=kies([3,4,5,6,8,10,12]),gr=ri(2,8);
    var doos=pak*gr+ri(0,pak-1),vol=Math.floor(doos/pak),rest=doos%pak;
    var r=mc(vol+' pakkets',[vol+1+' pakkets',vol-1+' pakkets',Math.ceil(doos/pak)+' pakkets']);
    return{niveau:1,categorie:'Getallen',context:n+' werkt in een magazijn en vult dozen.',
      vraag:'In een doos passen '+doos+' producten. Per pakket gaan er '+pak+' stuks. Hoeveel volledige pakkets passen er?',
      type:'mc',opties:r.opties,correct:r.correct,eenheid:'pakkets',
      uitleg:doos+'÷'+pak+'='+vol+(rest?' rest '+rest:'')+'. <strong>'+vol+' volledige pakkets</strong>.',
      coachTekst:coach()+': "Deelsom: totaal ÷ per pakket. '+doos+'÷'+pak+'='+vol+'."'};},

  function(){var n=naam(),a=ri(100,5000),b=ri(100,5000),som=a+b;
    var r=mc(fmt(som),[fmt(som+ri(10,200)),fmt(som-ri(5,100)),fmt(a+b+100)]);
    return{niveau:1,categorie:'Getallen',context:n+' analyseert de bezoekersaantallen van een website.',
      vraag:'Maandag: '+fmt(a)+' bezoekers. Dinsdag: '+fmt(b)+'. Hoeveel in totaal?',
      type:'mc',opties:r.opties,correct:r.correct,eenheid:'bezoekers',
      uitleg:fmt(a)+' + '+fmt(b)+' = <strong>'+fmt(som)+'</strong>.',
      coachTekst:coach()+': "Gewoon optellen: '+fmt(a)+' + '+fmt(b)+' = '+fmt(som)+'."'};},

  function(){var n=naam(),begin=ri(50,500),verkocht=ri(10,begin-5),over=begin-verkocht;
    var r=mc(over+' stuks',[over+10+' stuks',over-5+' stuks',begin-verkocht+5+' stuks']);
    return{niveau:1,categorie:'Getallen',context:n+' beheert de voorraad van een winkel.',
      vraag:'Beginvoorraad: '+begin+' stuks. Er worden '+verkocht+' stuks verkocht. Hoeveel zijn er nog?',
      type:'mc',opties:r.opties,correct:r.correct,eenheid:'stuks',
      uitleg:begin+' − '+verkocht+' = <strong>'+over+' stuks</strong>.',
      coachTekst:coach()+': "Beginvoorraad min verkochte stuks. '+begin+' − '+verkocht+' = '+over+'."'};},

  /* ══ NIVEAU 1 — VERHOUDINGEN ══ */
  function(){var n=naam(),a=ri(1,5),b=ri(1,5);
    while(a===b)b=ri(1,5);
    var deel=ri(2,8),totaal=(a+b)*deel,deelA=a*deel;
    var obj=kies(['jongens en meisjes','auto\'s en fietsen','goedkope en dure producten']);
    var r=mc(deelA+' stuks',[b*deel+' stuks',deelA+deel+' stuks',Math.round(totaal/a)+' stuks']);
    return{niveau:1,categorie:'Verhoudingen',context:'In een groep van '+totaal+' is de verhouding '+obj.split(' en ')[0]+' : '+obj.split(' en ')[1]+' = '+a+' : '+b+'.',
      vraag:'Hoeveel '+obj.split(' en ')[0]+' zijn er?',
      type:'mc',opties:r.opties,correct:r.correct,eenheid:'stuks',
      uitleg:'Totale delen: '+(a+b)+'. Per deel: '+totaal+'÷'+(a+b)+'='+deel+'. Deel A: '+a+'×'+deel+' = <strong>'+deelA+'</strong>.',
      coachTekst:coach()+': "Tel de delen op ('+(a+b)+'), bereken per deel ('+deel+'), vermenigvuldig met het aandeel ('+a+')."'};},

  function(){var n=naam(),schaal=kies([1000,2000,5000,10000,25000,50000]);
    var cm=ri(2,20),echt_m=cm*schaal,echt_km=af(echt_m/1000,echt_m>=1000?1:0);
    var r=mc(echt_km+' km',[af(echt_km*2,1)+' km',af(echt_km/2,1)+' km',af(echt_km+1,1)+' km']);
    return{niveau:1,categorie:'Verhoudingen',context:n+' gebruikt een kaart met schaal 1 : '+fmt(schaal)+'.',
      vraag:'Een weg is op de kaart '+cm+' cm lang. Hoe lang is de weg in werkelijkheid (in km)?',
      type:'mc',opties:r.opties,correct:r.correct,eenheid:'km',
      uitleg:cm+' cm × '+fmt(schaal)+' = '+fmt(echt_m)+' cm = <strong>'+echt_km+' km</strong>.',
      coachTekst:coach()+': "Vermenigvuldig kaartmaat met de schaalfactor, deel dan door 100.000 voor km."'};},

  function(){var n=naam(),pb=kies([2,4,6]),pw=ri(2,10);
    while(pw===pb)pw=ri(2,10);
    var gram=ri(1,8)*50,gramW=Math.round(gram/pb*pw);
    var r=mc(gramW+' g',[gramW+50+' g',gramW-25+' g',Math.round(gram*pw)+' g']);
    return{niveau:1,categorie:'Verhoudingen',context:n+' bakt koekjes. Het recept is voor '+pb+' personen en vraagt '+gram+' gram bloem.',
      vraag:n+' bakt voor '+pw+' personen. Hoeveel gram bloem heeft '+n+' nodig?',
      type:'mc',opties:r.opties,correct:r.correct,eenheid:'gram',
      uitleg:'Per persoon: '+gram+'÷'+pb+'='+af(gram/pb,1)+' g. Voor '+pw+': '+af(gram/pb,1)+'×'+pw+' = <strong>'+gramW+' g</strong>.',
      coachTekst:coach()+': "Eerst per persoon berekenen, dan vermenigvuldigen met het nieuwe aantal."'};},

  /* ══ NIVEAU 1 — PROCENTEN ══ */
  function(){var n=naam(),prijs=ri(2,20)*10,pct=kies([5,10,15,20,25,50]),korting=af(prijs*pct/100,2);
    return{niveau:1,categorie:'Procenten',context:n+' gaat shoppen in de uitverkoop.',
      vraag:'Een artikel kost €'+prijs+'. Er is '+pct+'% korting. Hoeveel euro is de korting?',
      type:'open',correct:''+korting,eenheid:'€',
      uitleg:pct+'% van €'+prijs+' = '+pct+'÷100 × '+prijs+' = <strong>€'+fmt(korting,2)+'</strong>.',
      coachTekst:coach()+': "Procent→decimaal: '+pct+'÷100='+pct/100+'. Dan: '+pct/100+' × '+prijs+' = '+fmt(korting,2)+'."'};},

  function(){var n=naam(),prijs=ri(2,20)*10,pct=kies([5,10,20,25,30]),nieuw=af(prijs*(1-pct/100),2);
    var r=mc('€'+fmt(nieuw,2),['€'+fmt(af(prijs*pct/100,2),2),'€'+fmt(af(nieuw+10,2),2),'€'+fmt(af(nieuw-5,2),2)]);
    return{niveau:1,categorie:'Procenten',context:n+' ziet een aanbieding in de winkel.',
      vraag:'De originele prijs is €'+prijs+'. Nu '+pct+'% korting. Wat is de nieuwe prijs?',
      type:'mc',opties:r.opties,correct:r.correct,eenheid:'€',
      uitleg:'Nieuw = '+prijs+' × '+af(1-pct/100,2)+' = <strong>€'+fmt(nieuw,2)+'</strong>.',
      coachTekst:coach()+': "Snelste methode: prijs × (1 − pct/100). '+prijs+' × '+af(1-pct/100,2)+' = '+fmt(nieuw,2)+'."'};},

  function(){var n=naam(),totaal=ri(2,10)*100,deel=ri(1,9)*10;
    while(deel>=totaal)deel=ri(1,9)*10;
    var pct=Math.round(deel/totaal*100);
    var r=mc(pct+'%',[pct+10+'%',pct-5+'%',Math.round(totaal/deel)+'%']);
    return{niveau:1,categorie:'Procenten',context:n+' analyseert een enquête-uitslag.',
      vraag:'Van de '+totaal+' respondenten antwoordden '+deel+' met "ja". Welk percentage is dat?',
      type:'mc',opties:r.opties,correct:r.correct,eenheid:'%',
      uitleg:deel+'÷'+totaal+' × 100 = <strong>'+pct+'%</strong>.',
      coachTekst:coach()+': "Deel ÷ geheel × 100. '+deel+'÷'+totaal+'='+af(deel/totaal,2)+'. ×100='+pct+'%."'};},

  /* ══ NIVEAU 1 — METEN ══ */
  function(){var n=naam(),km=ri(1,25);
    if(Math.random()<0.5){var m=km*1000;
      var r=mc(fmt(m)+' m',[fmt(m+500)+' m',fmt(m-200)+' m',fmt(km*100)+' m']);
      return{niveau:1,categorie:'Meten',context:n+' gaat hardlopen.',
        vraag:'De route is '+km+' km. Hoeveel meter is dat?',
        type:'mc',opties:r.opties,correct:r.correct,eenheid:'m',
        uitleg:km+' km × 1.000 = <strong>'+fmt(m)+' m</strong>.',
        coachTekst:coach()+': "1 km = 1.000 m. Vermenigvuldig: '+km+' × 1.000 = '+fmt(m)+'."'};
    }else{var m2=km*1000;

  function(){var n=naam(),mpct=kies([10,20,25,30,40,50]),inkoop=ri(5,20)*10;

  function(){var n=naam(),a=ri(1,5),b=ri(1,5),c=ri(1,5);

  function(){var n=naam(),km1=ri(3,12)*10,v1=kies([60,80,90,100,120]);

  function(){var n=naam(),kap=ri(5,20)*100,rente=kies([2,3,4,5,6,8,10]),jaren=ri(2,5);

    return{niveau:3,categorie:'Meten',context:n+' reist via twee treinen. Trein 1: '+km1+' km á '+v1+' km/u. Overstap: '+wacht+' min. Trein 2: '+km2+' km á '+v2+' km/u.',

  function(){var n=naam(),pct=kies([5,10,20,25,50]),nieuw=ri(3,15)*100,oud=Math.round(nieuw/(1+pct/100));
    var r=mc('€'+fmt(oud),['€'+fmt(nieuw-pct),'€'+fmt(oud+pct),'€'+fmt(Math.round(nieuw*(1-pct/100)))]);
    return{niveau:3,categorie:'Procenten',context:n+' ziet dat een prijs met '+pct+'% is gestegen. De huidige prijs is €'+fmt(nieuw)+'.',

      coachTekst:coach()+': "Nieuw = oud × '+af(1+pct/100,2)+'. Omdraaien: oud = nieuw ÷ '+af(1+pct/100,2)+'. Nooit gewoon '+pct+'% aftrekken!"'};},

  function(){var n=naam(),oud=ri(2,10)*100,pct=kies([5,10,15,20,25]),abs=Math.round(oud*pct/100),nieuw=oud+abs;
    return{niveau:3,categorie:'Procenten',context:n+' vergelijkt twee jaarcijfers. Vorig jaar: €'+fmt(oud)+'. Dit jaar: €'+fmt(nieuw)+'.',

  function(){var n=naam(),tel=ri(1,9),noem=kies([4,5,8,10,20,25]);
    while(tel>=noem)tel=ri(1,noem-1);
    var pct=Math.round(tel/noem*100);
    var r=mc(pct+'%',[Math.round((tel+1)/noem*100)+'%',Math.round(tel/(noem+5)*100)+'%',noem-tel+'%']);
    return{niveau:3,categorie:'Verhoudingen',context:n+' analyseert marktaandelen.',

      coachTekst:coach()+': "Breuk→percentage: teller ÷ noemer × 100. '+tel+'÷'+noem+'='+af(tel/noem,3)+'. ×100='+pct+'%."'};},

  function(){var n=naam(),start=ri(2,10)*100,groei=ri(1,5)*10,jaar=ri(3,8),eind=start+groei*jaar;
    var r=mc('€'+fmt(eind),['€'+fmt(eind+groei),'€'+fmt(Math.round(start*Math.pow(1+groei/start,jaar))),'€'+fmt(eind-groei)]);
    return{niveau:3,categorie:'Getallen',context:n+' heeft een salaris van €'+fmt(start)+'/maand. Elk jaar stijgt het met €'+groei+'.',
      vraag:'Wat is het salaris na '+jaar+' jaar?',

      uitleg:'Stijging: '+groei+' × '+jaar+' = €'+groei*jaar+'. Eind: '+fmt(start)+'+'+groei*jaar+' = <strong>€'+fmt(eind)+'</strong>.',
      coachTekst:coach()+': "Lineaire groei: beginwaarde + (groei per jaar × aantal jaren). '+fmt(start)+'+'+groei+'×'+jaar+'='+fmt(eind)+'."'};},

  function(){var n=naam(),basis=ri(5,20)*10,nieuwaantal=basis+ri(-3,6)*kies([1,2,5]);
    if(nieuwaantal<=0)return null;
    var index=Math.round(nieuwaantal/basis*100);
    var r=mc(index,[index+5,index-10,Math.round(basis/nieuwaantal*100)]);
    return{niveau:3,categorie:'Verhoudingen',context:n+' berekent een prijsindex. Basisjaar: €'+fmt(basis)+'. Nu: €'+fmt(nieuwaantal)+'.',
      vraag:'Wat is de prijsindex (basisjaar = 100)?',
      type:'mc',opties:r.opties,correct:r.correct,eenheid:'',
      uitleg:'Index = ('+fmt(nieuwaantal)+'÷'+fmt(basis)+') × 100 = <strong>'+index+'</strong>.',
      coachTekst:coach()+': "Index = (nieuwe waarde ÷ basiswaarde) × 100. '+fmt(nieuwaantal)+'÷'+fmt(basis)+'='+af(nieuwaantal/basis,2)+'. ×100='+index+'."'};},

  function(){var n=naam(),korting=kies([10,20,25,30,50]),betaald=ri(3,20)*kies([5,10]);
    var origineel=Math.round(betaald/(1-korting/100));
    var r=mc('€'+fmt(origineel),['€'+fmt(betaald+korting),'€'+fmt(Math.round(betaald*(1+korting/100))),'€'+fmt(origineel+10)]);
    return{niveau:3,categorie:'Procenten',context:n+' heeft een jas gekocht met '+korting+'% korting en betaalde €'+betaald+'.',
      vraag:'Wat was de originele prijs?',
      type:'mc',opties:r.opties,correct:r.correct,eenheid:'€',
      uitleg:'Betaald = origineel × '+af(1-korting/100,2)+'. Origineel = '+betaald+'÷'+af(1-korting/100,2)+' = <strong>€'+fmt(origineel)+'</strong>.',
      coachTekst:coach()+': "Na korting: betaald = origineel × '+af(1-korting/100,2)+'. Omdraaien: origineel = betaald ÷ '+af(1-korting/100,2)+'."'};},

];

/* ─── STATE ──────────────────────────────────────────────────────────────── */
var LS='vlacoRT3';
var _st=null,_huidig=null;

function laad(){
  try{var r=localStorage.getItem(LS);if(r){_st=JSON.parse(r);return;}}catch(e){}
  _st={skill:0,streak:0,goed:0,fout:0,totaal:0};
}
function sla(){try{localStorage.setItem(LS,JSON.stringify(_st));}catch(e){}}
function niv(s){return s<=3.5?1:s<=7?2:3;}
function meterTxt(s){
  if(s<1)return'Starter';if(s<2)return'Groeiend';if(s<4)return'Basis';
  if(s<6)return'Op niveau';if(s<8)return'Vaardig';if(s<9.5)return'Expert';
  return'🏆 Meester';}

/* ─── GENEREER VRAAG ─────────────────────────────────────────────────────── */
function genereer(gewenstNiv){
  var pool=shu(S);
  for(var i=0;i<60;i++){
    var fn=kies(pool);
    try{var v=fn();if(v&&v.niveau===gewenstNiv)return v;}catch(e){}
  }
  for(var j=0;j<40;j++){try{var vv=kies(S)();if(vv)return vv;}catch(e){}}
  return null;
}

/* ─── UI ─────────────────────────────────────────────────────────────────── */
function updateUI(){
  var pct=Math.round(_st.skill/10*100);
  var bar=document.getElementById('rt-bar');if(bar)bar.style.width=pct+'%';
  var mv=document.getElementById('rt-mval');if(mv)mv.textContent=meterTxt(_st.skill);
  var st=document.getElementById('rt-streak');if(st)st.textContent='🔥 '+_st.streak+' op rij';
  var g=document.getElementById('rt-goed');if(g)g.textContent=_st.goed;
  var f=document.getElementById('rt-fout');if(f)f.textContent=_st.fout;
  var t=document.getElementById('rt-tot');if(t)t.textContent=_st.totaal;
  var p=document.getElementById('rt-pct');
  if(p)p.textContent=_st.totaal>0?Math.round(_st.goed/_st.totaal*100)+'%':'—';
}

function lvlBadge(n){
  if(n===1)return'<span class="rt-lvl-badge easy">⭐ Makkelijk</span>';
  if(n===2)return'<span class="rt-lvl-badge med">⭐⭐ Gemiddeld</span>';
  return'<span class="rt-lvl-badge hard">⭐⭐⭐ Uitdagend</span>';}

function toon(v){
  _huidig=v;
  var k=document.getElementById('rt-kaart');
  if(!k||!v)return;
  var html='<div class="rt-badge-row"><span class="rt-cat-badge">📐 '+v.categorie+'</span>'+lvlBadge(v.niveau)+'</div>';
  if(v.context)html+='<div class="rt-context">'+v.context+'</div>';
  html+='<div class="rt-vraag">'+v.vraag+'</div>';
  if(v.type==='mc'){
    html+='<div class="opts" id="rt-opts">';
    v.opties.forEach(function(o,i){html+='<button class="opt" onclick="vlacoMCklik(this,'+i+')">'+o+'</button>';});
    html+='</div>';
  }else{
    html+='<input class="rt-inp" id="rt-inp" type="text" placeholder="Typ jouw antwoord…" onkeydown="if(event.key===\'Enter\')vlacoOpenCheck()">';
    html+='<div class="rt-hint">Typ alleen het getal (zonder eenheid of €-teken).</div>';
  }
  html+='<div class="qfb" id="rt-fb"></div>';
  html+='<div class="rt-btn-row">';
  if(v.type==='open')html+='<button class="rt-btn rt-btn-primary" id="rt-cbtn" onclick="vlacoOpenCheck()">✔ Controleer</button>';
  html+='<button class="rt-btn rt-btn-next" id="rt-nbtn" onclick="vlacoVolgende()">Volgende vraag →</button>';
  html+='</div>';
  k.innerHTML=html;
  if(v.type==='open'){var inp=document.getElementById('rt-inp');if(inp)inp.focus();}
}

function feedback(goed,v){
  var fb=document.getElementById('rt-fb');if(!fb)return;
  fb.className='qfb '+(goed?'ok':'fout');
  fb.innerHTML=(goed?'✅ <strong>Goed zo!</strong> ':'❌ <strong>Helaas.</strong> ')+v.uitleg
    +(goed?'':'<div class="qfb-coach">💬 '+v.coachTekst+'</div>');
  var nb=document.getElementById('rt-nbtn');if(nb)nb.style.display='inline-block';
  var cb=document.getElementById('rt-cbtn');if(cb)cb.style.display='none';
}

function verwerk(goed){
  _st.totaal++;
  if(goed){_st.goed++;_st.streak++;_st.skill=Math.min(10,_st.skill+1);}
  else{_st.fout++;_st.streak=0;_st.skill=Math.max(0,_st.skill-0.5);}
  sla();updateUI();
}

/* ─── PUBLIEKE FUNCTIES ──────────────────────────────────────────────────── */
window.vlacoMCklik=function(btn,idx){
  var opts=document.querySelectorAll('#rt-opts .opt');
  if(!opts.length||opts[0].disabled)return;
  opts.forEach(function(o){o.disabled=true;});
  var goed=(idx===_huidig.correct);
  btn.classList.add(goed?'ok':'fout');
  if(!goed)opts[_huidig.correct].classList.add('ok');
  feedback(goed,_huidig);verwerk(goed);
};

window.vlacoOpenCheck=function(){
  var inp=document.getElementById('rt-inp');
  if(!inp||inp.disabled)return;
  inp.disabled=true;
  var gegeven=parseFloat(inp.value.trim().replace(/[€\s\.]/g,'').replace(',','.'));
  var correct=parseFloat(String(_huidig.correct).replace(',','.'));
  var goed=!isNaN(gegeven)&&Math.abs(gegeven-correct)<=Math.max(0.02,Math.abs(correct)*0.011);
  inp.classList.add(goed?'ok':'fout');
  feedback(goed,_huidig);verwerk(goed);
};

window.vlacoVolgende=function(){
  var v=genereer(niv(_st.skill));
  if(!v){console.warn('vlacoRT: geen vraag gegenereerd');return;}
  toon(v);
};

window.vlacoRekenReset=function(){
  if(!confirm('Wil je je volledige voortgang wissen?'))return;
  localStorage.removeItem(LS);laad();updateUI();_huidig=null;vlacoVolgende();
};

/* ─── INIT bij laden pagina ─────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',function(){
  laad();updateUI();vlacoVolgende();
});

})();
</script>

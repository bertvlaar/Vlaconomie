<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vlaconomie — Adaptieve Rekentrainer 2F</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --groen:#0f4d2e;--gd:#1a7a4a;--gl:#2ecc71;--glicht:#e8faf0;--gzl:#f0fdf4;
  --goud:#f0c040;--goudd:#d4a012;
  --rood:#b30000;--roodl:#e53e3e;
  --rand:#e0e8f4;--bg:#f4f7f4
}
body{font-family:'DM Sans',Arial,sans-serif;background:var(--bg);color:#1a1a2e;font-size:15px;min-height:100vh}

/* ── Header ── */
header{background:linear-gradient(135deg,var(--groen),var(--gd));position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,77,46,.4)}
.hdr-top{padding:10px 20px;display:flex;align-items:center;gap:12px}
.logo{font-family:'Lexend',sans-serif;font-size:1.3rem;font-weight:800;color:#fff;text-decoration:none;letter-spacing:-.5px}
.logo em{color:var(--goud);font-style:normal}
.logo-sub{font-size:.68rem;color:rgba(255,255,255,.65);font-family:'DM Sans',sans-serif;margin-top:1px}
.hdr-terug{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;font-family:'Lexend',sans-serif;font-size:.78rem;font-weight:600;padding:7px 14px;border-radius:20px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:background .2s}
.hdr-terug:hover{background:rgba(255,255,255,.25)}

/* ── Main ── */
main{max-width:820px;margin:0 auto;padding:20px 14px 60px}

/* ── Kaart-header ── */
.rt-header{background:linear-gradient(135deg,var(--groen),var(--gd));color:#fff;padding:22px 26px;border-radius:12px 12px 0 0}
.rt-header .pn{font-family:'Lexend',sans-serif;font-size:.7rem;background:var(--goud);color:var(--groen);padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:8px;font-weight:700}
.rt-header h1{font-family:'Lexend',sans-serif;font-size:1.4rem;margin-bottom:4px;font-weight:800}
.rt-header p{color:rgba(255,255,255,.8);font-size:.87rem}

/* ── Niveau-balk ── */
.rt-meter-wrap{background:#fff;padding:13px 22px;border:1px solid var(--rand);border-top:none;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.rt-meter-label{font-family:'Lexend',sans-serif;font-size:.75rem;font-weight:700;color:var(--gd);white-space:nowrap}
.rt-meter-bar-bg{flex:1;height:10px;background:#e0e8f0;border-radius:10px;min-width:80px}
.rt-meter-bar{height:10px;border-radius:10px;background:linear-gradient(90deg,var(--gd),var(--gl));transition:width .6s ease;width:0%}
.rt-meter-val{font-family:'Lexend',sans-serif;font-size:.8rem;font-weight:700;color:var(--groen);min-width:72px;text-align:right}
.rt-streak{font-size:.75rem;color:var(--goudd);font-weight:700;font-family:'Lexend',sans-serif}
.rt-btn-reset{background:none;border:2px solid #ccc;color:#999;font-size:.72rem;padding:5px 11px;margin-left:auto;font-family:'Lexend',sans-serif;border-radius:8px;cursor:pointer;transition:all .2s}
.rt-btn-reset:hover{border-color:var(--roodl);color:var(--roodl)}

/* ── Vraag-body ── */
.rt-body{background:#fff;padding:22px 24px 26px;border:1px solid var(--rand);border-top:none;border-radius:0 0 12px 12px;margin-bottom:18px}

/* ── Stats-pills ── */
.rt-stats-row{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.rt-stat-pill{background:#f4f7f4;border:1px solid var(--rand);border-radius:20px;padding:4px 12px;font-size:.76rem;font-family:'Lexend',sans-serif;display:flex;align-items:center;gap:5px}
.rt-stat-pill span{font-weight:700;color:var(--gd)}

/* ── Badges ── */
.rt-badge-row{margin-bottom:11px}
.rt-cat-badge{display:inline-block;font-family:'Lexend',sans-serif;font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:12px;background:var(--glicht);color:var(--gd)}
.rt-lvl-badge{display:inline-block;font-family:'Lexend',sans-serif;font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:12px;margin-left:6px}
.rt-lvl-badge.easy{background:#d1fae5;color:#065f46}
.rt-lvl-badge.med{background:#fef3c7;color:#92400e}
.rt-lvl-badge.hard{background:#fee2e2;color:#991b1b}

/* ── Context + vraag ── */
.rt-context{background:var(--gzl);border-left:4px solid var(--gd);border-radius:0 8px 8px 0;padding:10px 14px;font-size:.87rem;color:#333;line-height:1.6;margin-bottom:13px}
.rt-vraag{font-weight:700;font-size:.95rem;line-height:1.6;color:#1a1a2e;margin-bottom:16px}

/* ── Open invoer ── */
.rt-inp-wrap{margin-bottom:8px}
.rt-inp-label{font-size:.76rem;color:var(--grijs,#6b7280);margin-bottom:5px;font-weight:600}
.rt-inp{width:100%;padding:11px 14px;border:2px solid var(--rand);border-radius:9px;font-size:.95rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,background .2s;line-height:1.4}
.rt-inp:focus{border-color:var(--gd);background:#fff}
.rt-inp.ok{border-color:var(--gd);background:var(--glicht)}
.rt-inp.fout{border-color:var(--roodl);background:#fdecea}
.rt-inp:disabled{cursor:default}
.rt-eenheid-hint{font-size:.76rem;color:var(--goudd);margin-top:4px;font-style:italic}

/* ── Feedback-balk (goed/fout) ── */
.rt-feedback{display:none;margin-top:10px;padding:12px 15px;border-radius:9px;font-size:.88rem;line-height:1.6;font-weight:600}
.rt-feedback.ok{display:block;background:var(--glicht);color:var(--groen);border-left:4px solid var(--gd)}
.rt-feedback.fout{display:block;background:#fdecea;color:#c0392b;border-left:4px solid var(--roodl)}
.rt-feedback-sub{font-weight:400;font-style:italic;margin-top:5px;color:#555;font-size:.84rem}

/* ── Modelantwoord-blok ── */
.rt-model{display:none;margin-top:14px;border:2px solid var(--goud);border-radius:10px;overflow:hidden}
.rt-model-header{background:linear-gradient(135deg,#fffbe6,#fef3c7);padding:10px 16px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.rt-model-header-tekst{font-family:'Lexend',sans-serif;font-size:.82rem;font-weight:700;color:var(--goudd)}
.rt-model-header-icon{font-size:1rem;transition:transform .25s}
.rt-model-body{display:none;padding:14px 16px;background:#fffdf0}
.rt-model-body.open{display:block}
.rt-model-header-icon.open{transform:rotate(90deg)}

/* Stappen in modelantwoord */
.rt-stap{display:flex;gap:11px;margin-bottom:12px;align-items:flex-start}
.rt-stap:last-child{margin-bottom:0}
.rt-stap-nr{flex-shrink:0;width:26px;height:26px;background:var(--goudd);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Lexend',sans-serif;font-size:.75rem;font-weight:800;margin-top:1px}
.rt-stap-tekst{font-size:.88rem;line-height:1.65;color:#333}
.rt-stap-tekst strong{color:var(--groen)}
.rt-stap-tekst .rt-formule{display:inline-block;background:#fff;border:1px solid var(--goud);border-radius:5px;padding:2px 8px;font-family:'Courier New',monospace;font-size:.84rem;color:var(--groen);font-weight:700;margin:2px 0}
.rt-antwoord-box{margin-top:10px;background:var(--glicht);border-left:4px solid var(--gd);padding:9px 13px;border-radius:0 7px 7px 0;font-family:'Lexend',sans-serif;font-size:.9rem;font-weight:700;color:var(--groen)}
.rt-coach{margin-top:10px;font-size:.82rem;font-style:italic;color:#666;border-top:1px dashed #e0e0c0;padding-top:8px}
.rt-coach strong{color:var(--gd);font-style:normal}

/* ── Knoppen ── */
.rt-btn-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;align-items:center}
.rt-btn{font-family:'Lexend',sans-serif;font-size:.82rem;font-weight:700;padding:9px 20px;border-radius:8px;cursor:pointer;transition:all .2s;border:2px solid transparent}
.rt-btn-check{background:var(--gd);color:#fff;border-color:var(--gd)}
.rt-btn-check:hover{background:var(--groen);border-color:var(--groen)}
.rt-btn-check:disabled{background:#ccc;border-color:#ccc;cursor:default}

/* Zelfbeoordeling na modelantwoord */
.rt-zelfoordeel{display:none;margin-top:14px;padding:13px 15px;background:#f8f8f8;border-radius:9px;border:1px solid var(--rand)}
.rt-zelfoordeel-vraag{font-family:'Lexend',sans-serif;font-size:.82rem;font-weight:700;color:#444;margin-bottom:10px}
.rt-zelfoordeel-knoppen{display:flex;gap:8px;flex-wrap:wrap}
.rt-zk{font-family:'Lexend',sans-serif;font-size:.8rem;font-weight:700;padding:8px 16px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .2s}
.rt-zk-goed{background:var(--glicht);color:var(--groen);border-color:var(--gd)}
.rt-zk-goed:hover{background:var(--gd);color:#fff}
.rt-zk-fout{background:#fdecea;color:#c0392b;border-color:var(--roodl)}
.rt-zk-fout:hover{background:var(--roodl);color:#fff}
.rt-zk-deels{background:#fff8e1;color:#92400e;border-color:var(--goudd)}
.rt-zk-deels:hover{background:var(--goudd);color:#fff}

.rt-btn-volgende{background:var(--goud);color:var(--groen);border-color:var(--goud);display:none}
.rt-btn-volgende:hover{background:var(--goudd);color:#fff;border-color:var(--goudd)}

@media(max-width:600px){
  .rt-header h1{font-size:1.15rem}
  .hdr-top{padding:8px 14px}
  .rt-zelfoordeel-knoppen{flex-direction:column}
}
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <a href="index.html" style="text-decoration:none">
      <div class="logo">vla<em>conomie</em>.nl</div>
      <div class="logo-sub">Economie · 2F Rekentrainer</div>
    </a>
    <a href="index.html" class="hdr-terug">← Terug naar home</a>
  </div>
</header>

<main>
  <div class="rt-header">
    <div class="pn">🧮 Rekentrainer 2F</div>
    <h1>Adaptieve Rekentrainer</h1>
    <p>Getallen · Verhoudingen · Procenten · Meten — schrijf je antwoord op en bekijk daarna de stapsgewijze uitleg</p>
  </div>

  <div class="rt-meter-wrap">
    <div class="rt-meter-label">Jouw niveau</div>
    <div class="rt-meter-bar-bg"><div class="rt-meter-bar" id="rt-bar"></div></div>
    <div class="rt-meter-val" id="rt-mval">Starter</div>
    <div class="rt-streak" id="rt-streak">🔥 0 op rij</div>
    <button class="rt-btn-reset" onclick="rtReset()">↺ Reset</button>
  </div>

  <div class="rt-body">
    <div class="rt-stats-row">
      <div class="rt-stat-pill">✅ Goed: <span id="rt-goed">0</span></div>
      <div class="rt-stat-pill">🔶 Deels: <span id="rt-deels">0</span></div>
      <div class="rt-stat-pill">❌ Fout: <span id="rt-fout">0</span></div>
      <div class="rt-stat-pill">📋 Totaal: <span id="rt-tot">0</span></div>
    </div>
    <div id="rt-kaart"></div>
  </div>
</main>

<script>
(function(){
'use strict';

/* ─── HULPFUNCTIES ─────────────────────────────────────────────────────── */
function ri(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function kies(arr){return arr[Math.floor(Math.random()*arr.length)];}
function af(n,d){return parseFloat(n.toFixed(d===undefined?2:d));}
function fmt(n,d){
  d=d===undefined?0:d;
  return af(n,d).toLocaleString('nl-NL',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function shu(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=ri(0,i);var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
var NAMEN=['Daan','Layla','Mo','Sara','Tim','Fenna','Jayden','Noor','Liam','Zara'];
var COACHES=['Daan','Layla'];
function naam(){return kies(NAMEN);}
function coach(){return kies(COACHES);}

/*
  Elke vraag heeft:
  - niveau: 1 | 2 | 3
  - categorie: string
  - context: string (situatieschets)
  - vraag: string
  - eenheid: string  (bijv. '€', '%', 'km', 'minuten')
  - stappen: array van strings — elke stap = één rekenregel
  - antwoord: string — het eindantwoord dat getoond wordt
  - coachTip: string — tip van Daan of Layla
*/

/* ─── SJABLONEN ────────────────────────────────────────────────────────── */
var S=[

  /* ══ NIVEAU 1 — GETALLEN ══ */

  function(){
    var n=naam(), u=ri(8,16)+kies([0,.25,.5,.75]), h=ri(2,9);
    var tot=af(u*h,2);
    return{niveau:1,categorie:'Getallen',
      context:n+' heeft een bijbaan en verdient €'+fmt(u,2)+' per uur.',
      vraag:''+n+' werkt '+h+' uur deze week. Hoeveel verdient '+n+' in totaal?',
      eenheid:'€',
      stappen:[
        'Schrijf de berekening op: uurloon × aantal uren',
        '<span class="rt-formule">€'+fmt(u,2)+' × '+h+'</span>',
        '= <strong>€'+fmt(tot,2)+'</strong>'
      ],
      antwoord:'€'+fmt(tot,2),
      coachTip:coach()+': "Uurloon × uren gewerkt = totaal verdiend. Controleer altijd of de komma klopt bij bedragen."'};},

  function(){
    var n=naam(), betaal=kies([5,10,20,50]);
    var p1=af(ri(1,3)+ri(1,9)*0.1,2), p2=af(ri(1,4)+ri(1,9)*0.1,2), p3=af(ri(1,2)+ri(1,9)*0.1,2);
    var som=af(p1+p2+p3,2), wissel=af(betaal-som,2);
    if(wissel<0.5||wissel>=betaal)return null;
    return{niveau:1,categorie:'Getallen',
      context:n+' betaalt met een briefje van €'+betaal+' in de supermarkt.',
      vraag:n+' koopt drie producten: €'+fmt(p1,2)+', €'+fmt(p2,2)+' en €'+fmt(p3,2)+'. Hoeveel wisselgeld krijgt '+n+' terug?',
      eenheid:'€',
      stappen:[
        'Stap 1 — Tel de drie bedragen op:',
        '<span class="rt-formule">€'+fmt(p1,2)+' + €'+fmt(p2,2)+' + €'+fmt(p3,2)+' = €'+fmt(som,2)+'</span>',
        'Stap 2 — Trek het totaal af van het betaalde bedrag:',
        '<span class="rt-formule">€'+betaal+' − €'+fmt(som,2)+' = <strong>€'+fmt(wissel,2)+'</strong></span>'
      ],
      antwoord:'€'+fmt(wissel,2),
      coachTip:coach()+': "Eerst optellen, dan aftrekken. Let op de kommagetallen!"'};},

  function(){
    var n=naam(), prijs=ri(2,15)+kies([0,.5]), aantal=ri(3,20);
    var tot=af(prijs*aantal,2);
    var prod=kies(['appels','peren','sinaasappels','bananen','tomaten','aardbeien']);
    return{niveau:1,categorie:'Getallen',
      context:n+' koopt '+prod+' op de markt. De prijs is €'+fmt(prijs,2)+' per kilo.',
      vraag:''+n+' koopt '+aantal+' kilo. Wat betaalt '+n+' in totaal?',
      eenheid:'€',
      stappen:[
        'Berekening: prijs per kilo × aantal kilo',
        '<span class="rt-formule">€'+fmt(prijs,2)+' × '+aantal+' = <strong>€'+fmt(tot,2)+'</strong></span>'
      ],
      antwoord:'€'+fmt(tot,2),
      coachTip:coach()+': "Prijs per eenheid × aantal eenheden geeft het totaalbedrag."'};},

  function(){
    var n=naam(), begin=ri(50,500), verkocht=ri(10,begin-10);
    var over=begin-verkocht;
    return{niveau:1,categorie:'Getallen',
      context:n+' beheert de voorraad van een winkel.',
      vraag:'Beginvoorraad: '+begin+' stuks. Er worden '+verkocht+' stuks verkocht. Hoeveel stuks zijn er nog over?',
      eenheid:'stuks',
      stappen:[
        'Berekening: beginvoorraad − verkochte stuks',
        '<span class="rt-formule">'+begin+' − '+verkocht+' = <strong>'+over+'</strong></span>'
      ],
      antwoord:''+over+' stuks',
      coachTip:coach()+': "Wat er over is = wat je had min wat je kwijt bent."'};},

  function(){
    var n=naam(), a=ri(150,4000), b=ri(150,4000), som=a+b;
    return{niveau:1,categorie:'Getallen',
      context:n+' analyseert de bezoekersaantallen van de schoolwebsite.',
      vraag:'Maandag waren er '+fmt(a)+' bezoekers, dinsdag '+fmt(b)+'. Hoeveel bezoekers waren er in totaal?',
      eenheid:'bezoekers',
      stappen:[
        'Berekening: dag 1 + dag 2',
        '<span class="rt-formule">'+fmt(a)+' + '+fmt(b)+' = <strong>'+fmt(som)+'</strong></span>'
      ],
      antwoord:fmt(som)+' bezoekers',
      coachTip:coach()+': "Simpel optellen — controleer of je de getallen goed overneemt."'};},

  function(){
    var n=naam(), pak=kies([3,4,5,6,8,10,12]), gr=ri(2,8);
    var doos=pak*gr+ri(0,pak-1), vol=Math.floor(doos/pak), rest=doos%pak;
    return{niveau:1,categorie:'Getallen',
      context:n+' werkt in een magazijn en verpakt producten.',
      vraag:'Er zijn '+doos+' producten. Per doos gaan er '+pak+' stuks. Hoeveel volle dozen kan '+n+' vullen?',
      eenheid:'dozen',
      stappen:[
        'Berekening: totaal ÷ stuks per doos',
        '<span class="rt-formule">'+doos+' ÷ '+pak+' = '+vol+(rest?' met rest '+rest:''+'</span>'),
        rest?'De rest ('+rest+' stuks) vormt geen volledige doos.':'Precies op — geen rest.',
        'Antwoord: <strong>'+vol+' volle dozen</strong>'
      ],
      antwoord:''+vol+' dozen',
      coachTip:coach()+': "Bij deelsommen met rest let je op het woord \'vol\' — een halve doos telt niet."'};},

  /* ══ NIVEAU 1 — VERHOUDINGEN ══ */

  function(){
    var n=naam(), a=ri(1,5), b=ri(1,5);
    while(a===b)b=ri(1,5);
    var deel=ri(2,8), totaal=(a+b)*deel, deelA=a*deel;
    var obj=kies(['jongens en meisjes','auto\'s en fietsen','vaste en variabele kosten','brood en zoet']);
    var delen=obj.split(' en ');
    return{niveau:1,categorie:'Verhoudingen',
      context:'In een groep van '+totaal+' mensen is de verhouding '+delen[0]+' : '+delen[1]+' = '+a+' : '+b+'.',
      vraag:'Hoeveel '+delen[0]+' zijn er in de groep?',
      eenheid:'personen',
      stappen:[
        'Stap 1 — Tel de verhoudingsgetallen op: '+a+' + '+b+' = '+(a+b)+' delen totaal',
        'Stap 2 — Bereken de waarde van één deel:',
        '<span class="rt-formule">'+totaal+' ÷ '+(a+b)+' = '+deel+' per deel</span>',
        'Stap 3 — '+delen[0]+' heeft '+a+' deel'+(a>1?'en':'')+':',
        '<span class="rt-formule">'+a+' × '+deel+' = <strong>'+deelA+'</strong></span>'
      ],
      antwoord:''+deelA+' '+delen[0],
      coachTip:coach()+': "Altijd drie stappen: (1) tel de verhoudingsgetallen op, (2) bereken één deel, (3) vermenigvuldig."'};},

  function(){
    var n=naam(), schaal=kies([1000,2000,5000,10000,25000,50000]);
    var cm=ri(2,20), echt_m=cm*schaal, echt_km=af(echt_m/1000,1);
    return{niveau:1,categorie:'Verhoudingen',
      context:n+' werkt met een kaart met schaal 1 : '+fmt(schaal)+'.',
      vraag:'Een weg is op de kaart '+cm+' cm lang. Hoe lang is de weg in werkelijkheid? Geef je antwoord in km.',
      eenheid:'km',
      stappen:[
        'Stap 1 — Vermenigvuldig de kaartafstand met de schaalfactor:',
        '<span class="rt-formule">'+cm+' cm × '+fmt(schaal)+' = '+fmt(echt_m)+' cm</span>',
        'Stap 2 — Zet cm om naar km (÷ 100.000):',
        '<span class="rt-formule">'+fmt(echt_m)+' ÷ 100.000 = <strong>'+fmt(echt_km,1)+' km</strong></span>'
      ],
      antwoord:fmt(echt_km,1)+' km',
      coachTip:coach()+': "Schaal 1:'+fmt(schaal)+' betekent: 1 cm op de kaart = '+fmt(schaal)+' cm in het echt. Deel daarna door 100.000 voor km."'};},

  function(){
    var n=naam(), pb=kies([2,4,6]), pw=ri(2,10);
    while(pw===pb)pw=ri(2,10);
    var gram=ri(1,8)*50, gramW=Math.round(gram/pb*pw);
    return{niveau:1,categorie:'Verhoudingen',
      context:n+' bakt koekjes. Het recept is voor '+pb+' personen en vraagt '+gram+' gram bloem.',
      vraag:n+' wil koekjes bakken voor '+pw+' personen. Hoeveel gram bloem heeft '+n+' nodig?',
      eenheid:'gram',
      stappen:[
        'Stap 1 — Bereken hoeveel gram bloem per persoon:',

/* ─── STATE ──────────────────────────────────────────────────────────────── */
var LS='vlacoRT4';
var _st=null, _huidig=null;

function laad(){
  try{var r=localStorage.getItem(LS);if(r){_st=JSON.parse(r);return;}}catch(e){}
  _st={skill:0,streak:0,goed:0,deels:0,fout:0,totaal:0};
}
function sla(){try{localStorage.setItem(LS,JSON.stringify(_st));}catch(e){}}
function niv(s){return s<=3.5?1:s<=7?2:3;}
function meterTxt(s){
  if(s<1)return'Starter';if(s<2)return'Groeiend';if(s<4)return'Basis';
  if(s<6)return'Op niveau';if(s<8)return'Vaardig';if(s<9.5)return'Expert';
  return'🏆 Meester';}

/* ─── GENEREER ───────────────────────────────────────────────────────────── */
function genereer(gewenstNiv){
  var pool=shu(S);
  for(var i=0;i<60;i++){
    var fn=kies(pool);
    try{var v=fn();if(v&&v.niveau===gewenstNiv)return v;}catch(e){}
  }
  for(var j=0;j<40;j++){try{var vv=kies(S)();if(vv)return vv;}catch(e){}}
  return null;
}

/* ─── UI UPDATES ─────────────────────────────────────────────────────────── */
function updateUI(){
  var pct=Math.round(_st.skill/10*100);
  var bar=document.getElementById('rt-bar');if(bar)bar.style.width=pct+'%';
  var mv=document.getElementById('rt-mval');if(mv)mv.textContent=meterTxt(_st.skill);
  var st=document.getElementById('rt-streak');if(st)st.textContent='🔥 '+_st.streak+' op rij';
  var g=document.getElementById('rt-goed');if(g)g.textContent=_st.goed;
  var d=document.getElementById('rt-deels');if(d)d.textContent=_st.deels;
  var f=document.getElementById('rt-fout');if(f)f.textContent=_st.fout;
  var t=document.getElementById('rt-tot');if(t)t.textContent=_st.totaal;
}

function lvlBadge(n){
  if(n===1)return'<span class="rt-lvl-badge easy">⭐ Makkelijk</span>';
  if(n===2)return'<span class="rt-lvl-badge med">⭐⭐ Gemiddeld</span>';
  return'<span class="rt-lvl-badge hard">⭐⭐⭐ Uitdagend</span>';}

/* ─── TOON VRAAG ─────────────────────────────────────────────────────────── */
function toon(v){
  _huidig=v;
  var k=document.getElementById('rt-kaart');
  if(!k||!v)return;

  // Bouw stappen HTML
  var stappenHtml=v.stappen.map(function(s,i){
    return '<div class="rt-stap">'
      +'<div class="rt-stap-nr">'+(i+1)+'</div>'
      +'<div class="rt-stap-tekst">'+s+'</div>'
      +'</div>';
  }).join('');

  var html='<div class="rt-badge-row">'
    +'<span class="rt-cat-badge">📐 '+v.categorie+'</span>'
    +lvlBadge(v.niveau)
    +'</div>';

  if(v.context) html+='<div class="rt-context">'+v.context+'</div>';
  html+='<div class="rt-vraag">'+v.vraag+'</div>';

  html+='<div class="rt-inp-wrap">'
    +'<div class="rt-inp-label">Jouw antwoord'+( v.eenheid?' (in '+v.eenheid+')':'')+':</div>'
    +'<input class="rt-inp" id="rt-inp" type="text" placeholder="Schrijf hier jouw antwoord…" '
    +'onkeydown="if(event.key===\'Enter\')rtControleer()">'
    +(v.eenheid?'<div class="rt-eenheid-hint">Tip: je hoeft de eenheid niet te typen, alleen het getal.</div>':'')
    +'</div>';

  html+='<div class="rt-feedback" id="rt-fb"></div>';

  // Modelantwoord-blok (verborgen tot geopend)
  html+='<div class="rt-model" id="rt-model">'
    +'<div class="rt-model-header" onclick="rtToggleModel()">'
    +'<span class="rt-model-header-icon" id="rt-model-icon">▶</span>'
    +'<span class="rt-model-header-tekst">💡 Bekijk het modelantwoord (stap voor stap)</span>'
    +'</div>'
    +'<div class="rt-model-body" id="rt-model-body">'
    +stappenHtml
    +'<div class="rt-antwoord-box">✅ Antwoord: '+v.antwoord+'</div>'
    +'<div class="rt-coach">💬 <strong>Tip:</strong> '+v.coachTip+'</div>'
    +'</div>'
    +'</div>';

  // Zelfbeoordeling (verschijnt na modelantwoord)
  html+='<div class="rt-zelfoordeel" id="rt-zb">'
    +'<div class="rt-zelfoordeel-vraag">Hoe ging het bij jou?</div>'
    +'<div class="rt-zelfoordeel-knoppen">'
    +'<button class="rt-zk rt-zk-goed" onclick="rtZelfOordeel(\'goed\')">✅ Helemaal goed</button>'
    +'<button class="rt-zk rt-zk-deels" onclick="rtZelfOordeel(\'deels\')">🔶 Deels goed</button>'
    +'<button class="rt-zk rt-zk-fout" onclick="rtZelfOordeel(\'fout\')">❌ Fout / snap het nog niet</button>'
    +'</div>'
    +'</div>';

  html+='<div class="rt-btn-row">'
    +'<button class="rt-btn rt-btn-check" id="rt-cbtn" onclick="rtControleer()">✔ Controleer mijn antwoord</button>'
    +'<button class="rt-btn rt-btn-volgende" id="rt-nbtn" onclick="rtVolgende()">Volgende vraag →</button>'
    +'</div>';

  k.innerHTML=html;
  var inp=document.getElementById('rt-inp');
  if(inp)inp.focus();
}

/* ─── CONTROLEER ANTWOORD ────────────────────────────────────────────────── */
window.rtControleer=function(){
  var inp=document.getElementById('rt-inp');
  if(!inp||inp.disabled)return;
  inp.disabled=true;

  // Haal numerieke waarde op (strips eenheid-tekens)
  var raw=inp.value.trim().replace(/[€\s\.]/g,'').replace(',','.');
  var gegeven=parseFloat(raw);
  // Haal correcte waarde op uit antwoord-string
  var antwoordRaw=(_huidig.antwoord||'').replace(/[€\s\.a-zA-ZëÉ%°\/²³]/g,'').replace(',','.');
  var correct=parseFloat(antwoordRaw);

  var fb=document.getElementById('rt-fb');
  var model=document.getElementById('rt-model');

  if(!isNaN(gegeven)&&!isNaN(correct)&&Math.abs(gegeven-correct)<=Math.max(0.02,Math.abs(correct)*0.015)){
    // Goed!
    inp.classList.add('ok');
    if(fb){
      fb.className='rt-feedback ok';
      fb.innerHTML='✅ <strong>Goed antwoord!</strong> Jouw antwoord klopt.'
        +'<div class="rt-feedback-sub">Bekijk het modelantwoord om te zien of je dezelfde aanpak had.</div>';
    }
  }else{
    // Niet correct — toon modelantwoord direct
    inp.classList.add('fout');
    if(fb){
      fb.className='rt-feedback fout';
      fb.innerHTML='❌ <strong>Dat klopt niet helemaal.</strong> Bekijk het modelantwoord hieronder en probeer te begrijpen waar het misging.';
    }
  }

  // Toon altijd het modelantwoord
  if(model) model.style.display='block';

  // Toon zelfbeoordeling
  var cbtn=document.getElementById('rt-cbtn');
  if(cbtn) cbtn.style.display='none';
};

/* ─── TOGGLE MODELANTWOORD ───────────────────────────────────────────────── */
window.rtToggleModel=function(){
  var body=document.getElementById('rt-model-body');
  var icon=document.getElementById('rt-model-icon');
  if(!body)return;
  var open=body.classList.toggle('open');
  if(icon) icon.classList.toggle('open',open);
  // Na openen: toon zelfbeoordeling
  if(open){
    var zb=document.getElementById('rt-zb');
    if(zb) zb.style.display='block';
  }
};

/* ─── ZELFBEOORDELING ────────────────────────────────────────────────────── */
window.rtZelfOordeel=function(oordeel){
  _st.totaal++;
  if(oordeel==='goed'){
    _st.goed++;_st.streak++;_st.skill=Math.min(10,_st.skill+1);
  }else if(oordeel==='deels'){
    _st.deels++;_st.streak=0;_st.skill=Math.max(0,_st.skill-0.25);
  }else{
    _st.fout++;_st.streak=0;_st.skill=Math.max(0,_st.skill-0.5);
  }
  sla();updateUI();

  // Verberg zelfbeoordeling-knoppen, toon volgende-knop
  var zb=document.getElementById('rt-zb');
  if(zb) zb.style.display='none';
  var nb=document.getElementById('rt-nbtn');
  if(nb) nb.style.display='inline-block';
};

/* ─── VOLGENDE VRAAG ─────────────────────────────────────────────────────── */
window.rtVolgende=function(){
  var v=genereer(niv(_st.skill));
  if(!v){console.warn('vlacoRT: geen vraag gegenereerd');return;}
  toon(v);
  window.scrollTo({top:0,behavior:'smooth'});
};

/* ─── RESET ─────────────────────────────────────────────────────────────── */
window.rtReset=function(){
  if(!confirm('Wil je je volledige voortgang wissen?'))return;
  localStorage.removeItem(LS);laad();updateUI();_huidig=null;rtVolgende();
};

/* ─── INIT ───────────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',function(){
  laad();updateUI();rtVolgende();
});

})();
</script>
</body>
</html>
